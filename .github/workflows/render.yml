name: Render R Markdown to PDF

on:
  push:
    paths:
      - '**.Rmd'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            pandoc

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c(
            'rmarkdown', 'tinytex', 'tidyverse', 'ggplot2', 'knitr',
            'gt', 'plotly', 'janitor', 'tidytuesdayR',
            'ggimage', 'curl', 'png', 'grid'
          ), repos='https://cloud.r-project.org')"

      - name: Install TinyTeX
        run: Rscript -e "tinytex::install_tinytex()"

      - name: Render PDF
        run: Rscript -e "rmarkdown::render('Pokemon-Tidy-Tuesday.Rmd', output_format='pdf_document')"

      - name: Commit rendered PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add rendered PDF [skip ci]"
          file_pattern: Pokemon-Tidy-Tuesday.pdf
          branch: main
