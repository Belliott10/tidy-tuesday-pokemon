name: Render R Markdown to PDF

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-extra

      - name: Install R packages
        run: |
          Rscript -e "
          lib <- '/home/runner/R/library'
          dir.create(lib, recursive = TRUE, showWarnings = FALSE)
          .libPaths(lib)
          install.packages(c(
            'rmarkdown', 'tidyverse', 'ggplot2', 'knitr',
            'gt', 'plotly', 'janitor', 'tidytuesdayR',
            'ggimage', 'curl', 'png', 'grid'
          ), lib = lib, repos='https://cloud.r-project.org')
          "

      - name: Render PDF
        run: |
          Rscript -e "
          .libPaths('/home/runner/R/library')
          rmarkdown::render('Pokemon-Tidy-Tuesday.Rmd', output_format='pdf_document')
          "

      - name: Commit and push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add Pokemon-Tidy-Tuesday.pdf
          git commit -m "Add rendered PDF [skip ci]" || echo "No changes to commit"
          git push
